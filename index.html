<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Health Hub</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head><body>
<header><h1><i class="fa-solid fa-heart-pulse"></i> Student Health Hub</h1><p>Healthy Students, Healthy Future</p></header>

<section class="dashboard">
<div class="tile"><i class="fa-solid fa-weight-scale"></i><span>BMI</span></div>
<div class="tile"><i class="fa-solid fa-glass-water"></i><span>Water</span></div>
<div class="tile"><i class="fa-solid fa-bed"></i><span>Sleep</span></div>
<div class="tile"><i class="fa-solid fa-fire"></i><span>Calories</span></div>
</section>

<div class="card">
<h2>BMI Calculator</h2>
<input id="h" type="number" placeholder="Height (cm)">
<input id="w" type="number" placeholder="Weight (kg)">
<button onclick="bmi()">Calculate</button>
<div class="meter"><div id="fill"></div></div>
<p id="bmiOut"></p>
</div>

<div class="card">
<h2>Water Intake</h2>
<input id="ww" type="number" placeholder="Weight (kg)">
<button onclick="water()">Calculate</button>
<p id="waterOut"></p>
</div>

<div class="card">
<h2>Sleep Recommendation</h2>
<select id="age">
<option value="child">5-12 Years</option>
<option value="teen">13-18 Years</option>
<option value="adult">18+ Years</option>
</select>
<button onclick="sleepRec()">Check</button>
<p id="sleepOut"></p>
</div>

<div class="card">
<h2>Calories</h2>
<input id="ca" type="number" placeholder="Age">
<select id="g"><option>Male</option><option>Female</option></select>
<input id="cw" type="number" placeholder="Weight (kg)">
<input id="ch" type="number" placeholder="Height (cm)">
<button onclick="calories()">Estimate</button>
<p id="calOut"></p>
</div>

<div class="card">
<h2>Healthy Tips</h2>
<ul>
<li>Drink enough water.</li>
<li>Sleep 8–10 hours.</li>
<li>Exercise daily.</li>
<li>Eat fruits and vegetables.</li>
<li>Limit junk food.</li>
</ul>
</div>

<footer>Developed by Swamrita</footer>
<script src="script.js"></script>
</body></html>
