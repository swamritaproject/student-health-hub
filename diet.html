<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Diet Planner</title><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css'><style>body{font-family:Arial;margin:0;background:#eef6ff;padding:18px}header{background:linear-gradient(135deg,#1976d2,#26c6da);color:#fff;padding:20px;border-radius:15px;text-align:center}.card{background:#fff;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 4px 12px rgba(0,0,0,.12)}select,button{width:100%;padding:12px;margin-top:10px;border-radius:10px}button{background:#1976d2;color:#fff;border:none}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{border:1px solid #ddd;padding:10px}th{background:#1976d2;color:#fff}.foods{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:15px}.food{background:#f4f9ff;padding:10px;border-radius:10px;text-align:center}.back{display:inline-block;margin-top:20px;color:#1976d2;text-decoration:none;font-weight:bold}</style></head><body><header><h1><i class='fa-solid fa-utensils'></i> Diet Planner</h1><p>Nutrition Guide</p></header><div class='card'><label>Age Group</label><select id='grp'><option value='child'>Children (4-10 Years)</option><option value='teen'>Teen (11-18 Years)</option><option value='male'>Adult Male</option><option value='female'>Adult Female</option><option value='senior'>Senior Citizen</option></select><button onclick='showPlan()'>Show Diet Plan</button><div id='out'></div><a class='back' href='index.html'>← Back to Home</a></div><script>const p={child:{c:'1200–1700 kcal',pr:'60 g',ca:'175 g',f:'40 g',w:'1.5–2 L',foods:['🥛 Milk','🍎 Apple','🥚 Egg','🥬 Spinach']},teen:{c:'2000–2400 kcal',pr:'65 g',ca:'300 g',f:'60 g',w:'2–3 L',foods:['🍗 Chicken','🍌 Banana','🥛 Milk','🍚 Rice']},male:{c:'2000–3000 kcal',pr:'70 g',ca:'400 g',f:'80 g',w:'3.7 L',foods:['🍗 Fish','🥚 Eggs','🥜 Nuts','🥦 Broccoli']},female:{c:'1800–2400 kcal',pr:'58 g',ca:'300 g',f:'65 g',w:'2.7 L',foods:['🥬 Spinach','🍎 Apple','🥛 Yogurt','🫘 Beans']},senior:{c:'1700–2200 kcal',pr:'60 g',ca:'250 g',f:'55 g',w:'2.5 L',foods:['🍲 Soup','🥛 Milk','🍌 Banana','🥬 Vegetables']}};function showPlan(){let d=p[grp.value];out.innerHTML=`<table><tr><th>Nutrient</th><th>Requirement</th></tr><tr><td>Calories</td><td>${d.c}</td></tr><tr><td>Protein</td><td>${d.pr}</td></tr><tr><td>Carbohydrates</td><td>${d.ca}</td></tr><tr><td>Fat</td><td>${d.f}</td></tr><tr><td>Water</td><td>${d.w}</td></tr></table><h3>Recommended Foods</h3><div class='foods'>${d.foods.map(x=>`<div class='food'>${x}</div>`).join('')}</div><p><b>Reference:</b> Educational values adapted from ICMR-NIN and WHO guidance.</p>`;}showPlan();</script></body></html>
