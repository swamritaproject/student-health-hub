<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diet Planner</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef6ff;
padding:18px;
}

header{
background:linear-gradient(135deg,#1976d2,#26c6da);
color:white;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card{
background:white;
border-radius:16px;
padding:20px;
margin-top:20px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

label{
font-weight:bold;
display:block;
margin-bottom:8px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
}

button{
width:100%;
padding:13px;
margin-top:15px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#125ea8;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#1976d2;
color:white;
padding:10px;
}

td{
padding:10px;
border:1px solid #ddd;
}

.foods{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.food{
background:#f4f9ff;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.back{

display:inline-block;

margin-top:20px;

text-decoration:none;

font-weight:bold;

color:#1976d2;

}

.nutritionCard{

margin-top:25px;

padding:20px;

border-radius:15px;

background:linear-gradient(135deg,#43cea2,#185a9d);

display:flex;

justify-content:space-between;

align-items:center;

cursor:pointer;

color:white;

transition:.3s;

}

.nutritionCard:hover{

transform:translateY(-4px);

box-shadow:0 8px 18px rgba(0,0,0,.2);

}

.nutritionCard h2{

margin-bottom:8px;

font-size:22px;

color:white;

}

.nutritionCard p{

margin:0;

color:#f5f5f5;

}

.nutritionCard i{

font-size:28px;

}

</style>

</head>

<body>

<header>

<h1>

<i class="fa-solid fa-utensils"></i>

Diet Planner

</h1>

<p>

Balanced Nutrition Guide

</p>

</header>

<div class="card">

<label>

Select Age Group

</label>

<select id="grp">

<option value="child">

Children (4–10 Years)

</option>

<option value="teen">

Teen (11–18 Years)

</option>

<option value="male">

Adult Male

</option>

<option value="female">

Adult Female

</option>

<option value="senior">

Senior Citizen

</option>

</select>

<button onclick="showPlan()">

Show Diet Plan

</button>

<div id="out">

</div>

<a class="back" href="index.html">

← Back to Home

</a>

</div>

<script src="diet.js"></script>

</body>

</html>
